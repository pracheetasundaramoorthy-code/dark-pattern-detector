<!DOCTYPE html>
<html>
<head>
    <title>Dark Pattern Detector</title>
</head>
<body>
    <h1>Dark Pattern Detector</h1>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter product URL" required>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        {% if result.error %}
            <p>{{ result.error }}</p>
        {% else %}
            <h2>Manipulation Score: {{ result.score }}</h2>

            <h3>Detected Patterns:</h3>
            <ul>
                {% for word, category in result.patterns %}
                    <li><b>{{ word }}</b> → {{ category }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endif %}
</body>
</html>
