<!DOCTYPE html>
<html>
<head>
    <title>Dark Pattern Detector</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        input {
            width: 60%;
            padding: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
        }

        .box {
            margin-top: 20px;
            padding: 20px;
            background: #1e293b;
            width: 70%;
            margin: auto;
            border-radius: 10px;
        }

        .danger { color: red; }
        .safe { color: lightgreen; }
    </style>
</head>

<body>

<h1>🛑 Dark Pattern Detector</h1>

<input type="text" id="url" placeholder="Enter product URL">
<br>
<button onclick="analyze()">Analyze</button>

<div class="box" id="result"></div>

<script>
async function analyze() {
    let url = document.getElementById("url").value;

    document.getElementById("result").innerHTML = "Analyzing...";

    let res = await fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url})
    });

    let data = await res.json();

    if (data.status === "error") {
        document.getElementById("result").innerHTML =
            "<span class='danger'>" + data.message + "</span>";
        return;
    }

    document.getElementById("result").innerHTML = `
        <h2>Manipulation Score: ${data.score}/100</h2>

        <p><b>Detected Patterns:</b> ${data.patterns.join(", ") || "None"}</p>

        <p><b>Keywords Found:</b> ${data.highlighted.join(", ") || "None"}</p>

        <h3 class="${data.score > 50 ? 'danger' : 'safe'}">
            ${data.score > 50 ? "⚠ High Risk Website" : "✔ Safe Website"}
        </h3>
    `;
}
</script>

</body>
</html>
