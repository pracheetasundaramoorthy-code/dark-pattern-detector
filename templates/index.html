<!DOCTYPE html>
<html>
<head>
    <title>Dark Pattern Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        input {
            width: 60%;
            padding: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }

        .box {
            margin-top: 20px;
            padding: 20px;
            background: #1e293b;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }

        .danger {
            color: red;
        }

        .safe {
            color: lightgreen;
        }
    </style>
</head>

<body>

<h1>🛑 Dark Pattern Detector</h1>

<input type="text" id="url" placeholder="Enter product URL">
<br>
<button onclick="analyze()">Analyze</button>

<div class="box" id="result"></div>

<script>
async function analyze() {
    const url = document.getElementById("url").value;

    document.getElementById("result").innerHTML = "Analyzing...";

    const res = await fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url})
    });

    const data = await res.json();

    if (data.status === "error") {
        document.getElementById("result").innerHTML =
            "<span class='danger'>" + data.message + "</span>";
        return;
    }

    document.getElementById("result").innerHTML = `
        <h3>Manipulation Score: ${data.manipulation_score}/100</h3>

        <p><b>Detected Patterns:</b> ${data.detected_patterns.join(", ") || "None"}</p>

        <p><b>Highlighted Keywords:</b> ${data.highlighted_text.join(", ") || "None"}</p>

        <p class="${data.manipulation_score > 50 ? 'danger' : 'safe'}">
            ${data.manipulation_score > 50 
                ? "⚠ High risk of dark patterns detected!" 
                : "✔ Low risk website"}
        </p>
    `;
}
</script>

</body>
</html>
