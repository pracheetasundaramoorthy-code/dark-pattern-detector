<!DOCTYPE html>
<html>
<head>
    <title>Dark Pattern Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            width: 60%;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 10px;
        }

        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        .high { color: red; }
        .medium { color: orange; }
        .low { color: green; }

        .highlight {
            background: yellow;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🛒 Dark Pattern Detector</h1>

    <div class="container">

        <form method="POST">
            <input type="text" name="url" placeholder="Enter product URL" required>
            <br>
            <button type="submit">Analyze</button>
        </form>

        {% if result %}
            {% if result.error %}
                <p>{{ result.error }}</p>
            {% else %}

                <h2>Score: {{ result.score }}</h2>

                <h3 class="{% if result.score > 70 %}high{% elif result.score > 30 %}medium{% else %}low{% endif %}">
                    {{ result.message }}
                </h3>

                <h3>Detected Patterns:</h3>
                <ul>
                    {% for word, category in result.patterns %}
                        <li><span class="highlight">{{ word }}</span> → {{ category }}</li>
                    {% endfor %}
                </ul>

            {% endif %}
        {% endif %}

    </div>

</body>
</html>
